name: mega-ci

on:
  push:
    branches: [ feat/gitops ]
    paths:
      - 'src/**'
      - 'pom.xml'
      - Dockerfile
  workflow_dispatch:

permissions:
  contents: write

env: 
  DOCKERHUB_REPO: trainwithshubham/ai-bankapp-eks

jobs:
  build-and-push:
    name: Build, Test and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Build with Maven
        run: ./mvnw clean package -DskipTests -B
      - name: Test with Maven
        run: ./mvnw test -B
        
      - name: set image tag
        id: tag
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:${{ steps.tag.outputs.sha_short }} 
            ${{ env.DOCKERHUB_REPO }}:latest
          cache-from: type=registry,
          cache-to: type=gha,mode=max
          
      - name: use kubectl to apply deployment
        uses: azure/setup-kubectl@v3
        run: |
          sed -i "s|image: ${{ env.DOCKERHUB_REPO }}:.*|image: ${{ env.DOCKERHUB_REPO }}:${{ steps.tag.outputs.sha_short }}|" k8s/bankapp-deployment.yml
      
      - name: commit and update manifest file
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com" 
          git add k8s/bankapp-deployment.yml
          git diff --staged --quiet || git commit -m "ci: update bankapp image to ${{ steps.tag.outputs.sha_short }} [skip ci]"
          git push



 
